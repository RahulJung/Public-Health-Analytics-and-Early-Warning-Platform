project:
  name: AI-Based Early Warning System for Syndromic Surveillance Data
  version: 1.0.0

data:
  cdc_api_url: "https://data.cdc.gov/resource/rdmq-nq56.json"
  app_token: ""
  raw_path: "data/raw/cdc_nssp_ed_trajectories_raw.csv"
  processed_path: "data/processed/cdc_nssp_ed_trajectories_processed.csv"
  max_records: 50000

model:
  rolling_window: 7
  zscore_threshold: 2.5
  contamination: 0.03
  forecast_model: "ARIMA"
  forecast_periods: 14
  rag_model: "gpt-4.1-mini"

risk_score:
  zscore_weight: 35
  growth_weight: 25
  isolation_weight: 25
  persistence_weight: 15
